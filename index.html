<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Júbilo TV</title>

  <!-- MODO APP -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .video-full {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* BOTONES FLOTANTES */
    .controls {
      position: fixed;
      bottom: 15px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
      z-index: 10;
    }

    .btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 12px 14px;
      border-radius: 50px;
      font-size: 14px;
      backdrop-filter: blur(6px);
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* OCULTAR BOTONES AUTOMATICO */
    .hide {
      opacity: 0;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>

  <div class="video-full">
    <iframe
      id="player"
      src="https://iblups.com/embed/jubilotv?autoplay=1&mute=1"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <div id="controls" class="controls">
    <button class="btn" onclick="recargar()">🔄</button>
    <a href="https://iblups.com/embed/jubilotv" target="_blank">
      <button class="btn">📺</button>
    </a>
  </div>

  <script>
    function recargar() {
      let p = document.getElementById('player');
      p.src = p.src;
    }

    // OCULTAR CONTROLES AUTOMATICO
    let controls = document.getElementById('controls');
    let timeout;

    function showControls() {
      controls.classList.remove('hide');
      clearTimeout(timeout);
      timeout = setTimeout(() => {
        controls.classList.add('hide');
      }, 3000);
    }

    document.addEventListener('touchstart', showControls);
    document.addEventListener('mousemove', showControls);

    showControls();

    // PWA INSTALL (opcional)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>

</body>
</html>
