<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Júbilo TV</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #111827 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 1100px;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 0.5px;
    }
    p {
      margin: 0 0 24px;
      color: #d1d5db;
      font-size: 1.05rem;
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
    }
    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .footer {
      margin-top: 18px;
      font-size: 0.95rem;
      color: #9ca3af;
    }
    .badge {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      color: #f9fafb;
      font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="badge">Canal en vivo</div>
      <h1>Júbilo TV</h1>
      <p>Bienvenido a nuestra transmisión en vivo. Disfruta de nuestra programación desde cualquier dispositivo.</p>

      <div class="video-wrapper">
        <iframe
          src="https://iblups.com/embed/jubilotv"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>

      <div class="footer">
        © 2026 Júbilo TV · Bendición Studios
      </div>
    </div>
  </div>
</body>
</html>
